name: Hisse Fiyatlarını Güncelle

on:
  schedule:
    # Her 10 dakikada bir, Pzt-Cuma 10:00-18:30 Türkiye saati (07:00-15:30 UTC)
    - cron: '*/10 7-15 * * 1-5'
  workflow_dispatch: # Manuel tetikleme butonu

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python ile fiyatları çek
        run: python scripts/fetch_prices.py

      - name: Değişiklikleri kaydet (commit)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add prices.json
          git diff --staged --quiet || git commit -m "Fiyat güncellemesi $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
